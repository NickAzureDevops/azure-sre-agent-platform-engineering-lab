name: Deploy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Run Terraform plan"
        type: boolean
        default: true
      apply:
        description: "Run Terraform apply"
        type: boolean
        default: true
      run_data_plane:
        description: "Run SRE data-plane setup (knowledge, subagents, response plan)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Azure login (includes CLI)
      # -----------------------------
      - name: Azure CLI login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -----------------------------
      # 3. Terraform setup
      # -----------------------------
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: Import existing smart detector alert rule
        if: ${{ inputs.plan || inputs.apply }}
        run: |
          set -euo pipefail
          TF_RESOURCE="azurerm_monitor_smart_detector_alert_rule.failure_anomalies"
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          # Use Python for robust HCL value extraction (handles quotes, whitespace, comments)
          RG=$(python3 -c "
          import re, sys
          with open('infra/terraform.tfvars') as f:
              for line in f:
                  m = re.match(r'\s*resource_group_name\s*=\s*\"([^\"]+)\"', line)
                  if m:
                      print(m.group(1)); sys.exit(0)
          print('ERROR: resource_group_name not found in terraform.tfvars', file=sys.stderr)
          sys.exit(1)")

          RULES_JSON=$(az rest \
            --method GET \
            --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.AlertsManagement/smartDetectorAlertRules?api-version=2021-04-01" \
            2>/dev/null || echo '{"value":[]}')

          # Use Python for case-insensitive name matching with error handling
          RULE_NAME=$(echo "$RULES_JSON" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
          except json.JSONDecodeError as e:
              print(f'WARNING: Failed to parse Azure API response: {e}', file=sys.stderr)
              sys.exit(0)
          for r in data.get('value', []):
              if 'failure anomalies' in r['name'].lower():
                  print(r['name']); sys.exit(0)")

          if [ -n "$RULE_NAME" ]; then
            RULE_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.AlertsManagement/smartDetectorAlertRules/${RULE_NAME}"
            if ! terraform -chdir=infra state show "${TF_RESOURCE}" > /dev/null 2>&1; then
              echo "Importing smart detector alert rule: $RULE_NAME"
              terraform -chdir=infra import "${TF_RESOURCE}" "$RULE_ID"
            else
              echo "Smart detector alert rule already in Terraform state, skipping import."
            fi
          else
            echo "No existing smart detector alert rule found in $RG, skipping import."
          fi

      - name: Terraform plan
        if: ${{ inputs.plan || inputs.apply }}
        run: terraform -chdir=infra plan -out=tfplan -var-file=terraform.tfvars

      - name: Terraform apply
        if: ${{ inputs.apply }}
        run: terraform -chdir=infra apply -auto-approve tfplan

      # -----------------------------
      # 4. Build + update Container Apps
      # -----------------------------
      - name: Build and update Container Apps
        if: ${{ inputs.apply }}
        shell: bash
        run: |
          set -euo pipefail

          TF_OUT="$(terraform -chdir=infra output -json)"
          read_tf() { echo "$TF_OUT" | jq -r ".${1}.value // empty"; }

          ACR_NAME="$(read_tf acr_name)"
          ACR_LOGIN_SERVER="$(read_tf acr_login_server)"
          ORDERS_API_NAME="$(read_tf orders_api_name)"
          CHANGE_LOOKUP_NAME="$(read_tf change_lookup_name)"
          AGENT_ID="$(read_tf agent_id)"
          RG="$(echo "$AGENT_ID" | cut -d/ -f5)"

          echo "Building images in ACR: $ACR_NAME"

          az acr build --registry "$ACR_NAME" --image orders-api:latest src/orders-api/ --no-logs
          az acr build --registry "$ACR_NAME" --image change-lookup:latest change-lookup/ --no-logs

          echo "Updating Container Apps…"

          az containerapp update \
            --name "$ORDERS_API_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/orders-api:latest" \
            --output none

          az containerapp update \
            --name "$CHANGE_LOOKUP_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/change-lookup:latest" \
            --output none

      # -----------------------------
      # 6. Run post-provision data-plane setup
      # -----------------------------
      - name: Run full post-provision setup
        if: ${{ inputs.run_data_plane }}
        shell: bash
        run: bash scripts/post-provision.sh

      # -----------------------------
      # 7. Dump Azure CLI logs on failure
      # -----------------------------
      - name: Dump Azure CLI logs on failure
        if: failure()
        run: |
          echo "Dumping Azure CLI logs..."
          cat ~/.azure/azure.err || true
          cat ~/.azure/azure.log || true
